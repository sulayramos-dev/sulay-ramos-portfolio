<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Secure OTAP architecture overview</title>
  <desc id="desc">Safe high-level diagram of a home OTAP platform without private IP addresses or hostnames.</desc>
  <rect width="1280" height="820" fill="#111827"/>
  <rect x="40" y="40" width="1200" height="740" rx="22" fill="#f7f5ef"/>
  <text x="80" y="105" fill="#151a22" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">Secure OTAP Home Infrastructure</text>
  <text x="80" y="145" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="20">High-level platform topology. Private IPs, hostnames and access paths redacted.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
    <rect x="80" y="230" width="190" height="96" rx="14" fill="#d7efe6" stroke="#0f766e" stroke-width="3"/>
    <text x="126" y="270" fill="#134e4a">Internet</text>
    <text x="114" y="300" fill="#134e4a" font-size="15" font-weight="500">External WAN</text>

    <rect x="350" y="210" width="210" height="136" rx="14" fill="#fff" stroke="#9a4f2f" stroke-width="3"/>
    <text x="395" y="258" fill="#151a22">Firewall</text>
    <text x="385" y="288" fill="#6b7280" font-size="15" font-weight="500">Router / DHCP / NAT</text>
    <text x="404" y="312" fill="#6b7280" font-size="15" font-weight="500">VPN gateway</text>

    <rect x="640" y="230" width="190" height="96" rx="14" fill="#fff" stroke="#b7791f" stroke-width="3"/>
    <text x="690" y="270" fill="#151a22">Switch</text>
    <text x="681" y="300" fill="#6b7280" font-size="15" font-weight="500">LAN backbone</text>

    <rect x="930" y="160" width="220" height="96" rx="14" fill="#151a22"/>
    <text x="1000" y="200" fill="#fff8ec">Server</text>
    <text x="978" y="230" fill="#ffe1a6" font-size="15" font-weight="500">Compute layer</text>

    <rect x="930" y="315" width="220" height="96" rx="14" fill="#151a22"/>
    <text x="1010" y="355" fill="#fff8ec">NAS</text>
    <text x="986" y="385" fill="#ffe1a6" font-size="15" font-weight="500">Storage layer</text>

    <rect x="930" y="470" width="220" height="96" rx="14" fill="#151a22"/>
    <text x="1004" y="510" fill="#fff8ec">WiFi AP</text>
    <text x="987" y="540" fill="#ffe1a6" font-size="15" font-weight="500">Access layer</text>
  </g>

  <g stroke="#0f766e" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M270 278 H350"/>
    <path d="M560 278 H640"/>
    <path d="M830 278 H890 Q910 278 910 258 V208 Q910 208 930 208"/>
    <path d="M830 278 H890 Q910 278 910 298 V363 Q910 363 930 363"/>
    <path d="M830 278 H890 Q910 278 910 338 V518 Q910 518 930 518"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="80" y="645" width="1080" height="72" rx="12" fill="#e5e7eb"/>
    <text x="110" y="690" fill="#151a22" font-size="20" font-weight="800">Design principle:</text>
    <text x="296" y="690" fill="#374151" font-size="20">Firewall = perimeter / Server = compute / NAS = storage / VPN = controlled remote access</text>
  </g>
</svg>
